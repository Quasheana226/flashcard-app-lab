<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FlashCards - Study with interactive flashcards">
    <title>FlashCards</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- BMW Flashcard App Navigation -->
    <nav aria-label="Main navigation">
        <header>
            <div class="nav-container">
                <!-- Logo Section -->
                <div class="logo-section">
                    <p class="app-subtitle">Learn BMW Parts & Components</p>                    <h1 class="app-title">
                </div>

                <!-- Navigation Controls -->
                <div class="nav-controls">
                    <button 
                        id="themeToggle" 
                        aria-label="Toggle dark mode" 
                        aria-pressed="false"
                        type="button"
                    >
                    </button>                        <span class="theme-icon">
                </div>
            </div>
        </header>
    </nav>

    <!-- Main Container -->
    <main class="main-container">
        <!-- Stats and Flashcard Section -->
        <section class="app-section" aria-labelledby="stats-heading">
            <!-- Stats Bar -->
            <div class="stats-bar">
                <!-- Current Card Stat -->
                <div class="stat-item">
                    <span class="stat-label">Card</span>
                    <span class="stat-value" id="currentCard">1</span>
                </div>

                <!-- Divider -->
                <div class="stat-divider"></div>

                <!-- Total Cards Stat -->
                <div class="stat-item">
                    <span class="stat-label">Total</span>
                    <span class="stat-value" id="totalCards">25</span>
                </div>

                <!-- Divider -->
                <div class="stat-divider"></div>

                <!-- Progress Stat -->
                <div class="stat-item">
                    <span class="stat-label">Progress</span>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 4%"></div>
                    </div>
                </div>
            </div>

            <!-- Flashcard Section -->
            <section class="flashcard-section" aria-labelledby="card-heading">
                <h2 id="card-heading" class="sr-only">Flashcard Display</h2>

                <!-- Card Container -->
                <div class="card-container">
                    <div id="flashcard" class="flashcard" aria-label="Flashcard content - click to flip">
                        <!-- Card Front -->
                        <div class="card-front">
                            <h2 id="cardQuestion">What is the engine block called in German?</h2>
                            <p class="card-hint">Hint: Motor part</p>
                        </div>

                        <!-- Card Back -->
                        <div class="card-back">
                            <p id="cardAnswer">Motorblock</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Status Message -->
            <div id="statusMessage" role="status" aria-live="polite" aria-atomic="true"></div>

            <!-- Controls Section -->
            <section class="controls-section" aria-labelledby="controls-heading">
                <h2 id="controls-heading" class="sr-only">Quiz Controls</h2>

                <!-- Main Action Buttons -->
                <div class="controls-grid">
                    <button 
                        id="startBtn" 
                        class="btn btn-primary" 
                        aria-label="Start the quiz"
                        type="button"
                    >
                        Start Quiz
                    </button>
                    <button 
                        id="flipBtn" 
                        class="btn btn-secondary" 
                        aria-label="Flip the current flashcard"
                        type="button"
                        disabled
                    >
                        Flip Card
                    </button>
                    <button 
                        id="resetBtn" 
                        class="btn btn-secondary" 
                        aria-label="Reset the quiz and start over"
                        type="button"
                        disabled
                    >
                        Reset
                    </button>
                </div>

                <!-- Navigation Buttons -->
                <div class="nav-buttons">
                    <button 
                        id="prevBtn" 
                        class="btn btn-nav btn-prev" 
                        aria-label="Go to previous card"
                        type="button"
                        disabled
                    >
 Previous                        
                    </button>
                    <button 
                        id="nextBtn" 
                        class="btn btn-nav btn-next" 
                        aria-label="Go to next card"
                        type="button"
                        disabled
                    >

                    </button>
                </div>
            </section>
        </section>
    </main>

    <!-- Footer -->
    <footer class="app-footer" role="contentinfo">
        <div class="footer-content">
            <p class="instructions">
                <strong>Keyboard shortcuts:</strong> 
                <span class="shortcut"><kbd>SPACE</kbd> to flip</span>
                <span class="shortcut"><</kbd> previous</span>kbd>
</kbd> next</span>
            </p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
